name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (must match package.json "version", e.g. 6.0.0)'
        required: true
        default: '6.0.0'

permissions:
  contents: write
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      app_version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release gate
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APP_VERSION=$(node -p "require('./package.json').version")
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if ! git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PREV=$(node -p "require('/tmp/prev-package.json').version")
            if [ "$APP_VERSION" = "$PREV" ]; then
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [gate]
    if: needs.gate.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: dist-macos
            build_cmd: bun run build:mac
          - os: windows-latest
            artifact: dist-windows
            build_cmd: bun run build:win

    runs-on: ${{ matrix.os }}
    concurrency:
      group: release-build-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build icons
        run: bun run build:icons

      - name: Build (${{ matrix.os }})
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  publish:
    needs: [gate, build]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.gate.outputs.should_build == 'true' && needs.build.result == 'success' }}

    steps:
      - name: Download macOS artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: upload

      - name: Download Windows artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: upload

      - name: List release files
        run: ls -la upload

      - name: Create GitHub Release (tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (main — version bump)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.app_version }}
          name: Release v${{ needs.gate.outputs.app_version }}
          target_commitish: ${{ github.sha }}
          files: upload/*
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.app_version }}
          name: Release v${{ needs.gate.outputs.app_version }}
          files: upload/*
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
