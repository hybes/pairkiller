name: Tag version

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: tag-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag-if-needed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: meta
        run: |
          CUR=$(node -p "require('./package.json').version")
          echo "version=$CUR" >> "$GITHUB_OUTPUT"
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if ! git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PREV=$(node -p "require('/tmp/prev-package.json').version")
            if [ "$CUR" = "$PREV" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.meta.outputs.changed == 'true'
        run: |
          tag="v${{ steps.meta.outputs.version }}"
          git fetch --tags --force
          if git show-ref --tags --verify --quiet "refs/tags/${tag}"; then
            echo "Tag ${tag} already exists — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag" "${{ github.sha }}"
          git push origin "$tag"
